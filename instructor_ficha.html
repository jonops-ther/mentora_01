<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentora - Admin Ficha (Instructor)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mentora: {
                            blue: { dark: '#143771', light: '#1F6DA9' },
                            green: '#AADD37',
                            orange: '#F9B032',
                            beige: '#ffffab'
                        }
                    },
                    fontFamily: {
                        heading: ['Inter', 'sans-serif'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/globals.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 h-[100dvh] overflow-hidden font-sans antialiased text-gray-900 flex justify-center">
    <!-- APP CONTAINER (Mobile Frame) -->
    <div class="w-full max-w-md bg-white h-[100dvh] shadow-2xl relative overflow-hidden flex flex-col">

        <!-- Header -->
        <header class="bg-mentora-blue-dark text-white p-4 flex items-center gap-4 z-10 sticky top-0">
            <a href="instructor_challenges.html" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <div class="flex-1">
                <h1 class="font-heading font-bold text-lg tracking-wide leading-tight">Comunicación</h1>
                <p id="ficha-subtitle" class="text-xs text-mentora-beige font-medium">Ficha 3114544</p>
            </div>
            <a href="instructor_profile.html" class="w-8 h-8 rounded-full overflow-hidden border-2 border-white/30 shadow-inner hover:scale-105 transition-transform shrink-0">
                <img src="https://images.unsplash.com/photo-1574144611937-0df059b5ef3e?w=80&h=80&fit=crop" onerror="this.onerror=null;this.src='assets/images/img_perfil.svg';" alt="Foto" class="w-full h-full object-cover">
            </a>
        </header>

        <!-- Main Content Area -->
        <main id="app-content" class="flex-1 overflow-y-auto pb-6 relative">

            <!-- Hero / Quick Actions -->
            <div class="bg-white px-6 pt-6 pb-4 border-b border-gray-100 shadow-sm relative overflow-hidden">
                <!-- Abstract BG Decor -->
                <div
                    class="absolute right-0 top-0 w-32 h-32 bg-mentora-blue-light/5 rounded-full -translate-y-1/2 translate-x-1/2">
                </div>

                <h2 class="font-heading font-bold text-xl text-mentora-blue-dark mb-4 relative z-10">Panel de
                    Administración</h2>

                <div class="grid grid-cols-2 gap-3 relative z-10">
                    <!-- Crear Post -->
                    <a href="instructor_create_post.html"
                        class="bg-blue-50 hover:bg-mentora-blue-light hover:text-white text-mentora-blue-dark transition-all rounded-2xl p-4 flex flex-col items-center text-center gap-2 group border border-blue-100/50 cursor-pointer">
                        <i data-lucide="send" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                        <span class="font-bold text-sm">Crear Post</span>
                    </a>
                    <!-- Intercambio de Puntos -->
                    <a href="instructor_market.html"
                        class="bg-green-50 hover:bg-mentora-green hover:text-mentora-blue-dark text-mentora-green transition-all rounded-2xl p-4 flex flex-col items-center text-center gap-2 group border border-green-100/50 cursor-pointer">
                        <i data-lucide="shopping-cart" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                        <span class="font-bold text-sm leading-tight">Intercambio<br>de Puntos</span>
                    </a>
                    <!-- Generar Actividad -->
                    <a id="btn-dyn-activity" href="instructor_activity_create.html"
                        class="bg-indigo-50 hover:bg-indigo-500 hover:text-white text-indigo-500 transition-all rounded-2xl p-4 flex flex-col items-center text-center gap-2 group border border-indigo-100/50 cursor-pointer">
                        <i data-lucide="check-square" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                        <span class="font-bold text-sm">Generar Actividad</span>
                    </a>
                    <!-- Asignar Recompensa -->
                    <a id="btn-dyn-reward" href="instructor_rewards.html"
                        class="bg-orange-50 hover:bg-mentora-orange hover:text-white text-mentora-orange transition-all rounded-2xl p-4 flex flex-col items-center text-center gap-2 group border border-orange-100/50 cursor-pointer">
                        <i data-lucide="gift" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                        <span class="font-bold text-sm leading-tight">Asignar<br>Recompensa</span>
                    </a>
                </div>
            </div>

            <!-- Aprendices List -->
            <div class="p-6">
                <div class="flex justify-between items-end mb-4">
                    <h3 class="font-heading font-bold text-lg text-mentora-blue-dark">Aprendices Matriculados</h3>
                    <span
                        class="bg-mentora-blue-light/10 text-mentora-blue-light px-2 py-0.5 rounded text-xs font-bold">20
                        Activos</span>
                </div>

                <div class="relative mb-5">
                    <input type="text" placeholder="Buscar aprendiz..."
                        class="w-full bg-gray-50 border border-gray-200 pl-10 pr-4 py-3 rounded-xl outline-none focus:border-mentora-blue-light transition-all text-sm">
                    <i data-lucide="search" class="w-5 h-5 text-gray-400 absolute left-3 top-3"></i>
                </div>

                <!-- 20 Hardcoded Dummy Students Container -->
                <div class="space-y-3" id="students-list">
                    <!-- Populated by JS for brevity in artifact -->
                </div>
            </div>

        </main>

        <!-- Bottom HUD (Mobile) -->
        <nav class="bg-white border-t border-gray-200 flex justify-around p-2 pb-safe absolute bottom-0 w-full z-50">
            <a href="instructor_home.html"
                class="flex flex-col items-center p-2 min-w-[64px] rounded-xl transition-all text-gray-400 hover:text-gray-600">
                <div class="p-1 rounded-lg mb-1">
                    <i data-lucide="home" class="w-6 h-6" stroke-width="2"></i>
                </div>
                <span class="text-[10px] font-medium">Home</span>
            </a>
            <a href="instructor_challenges.html"
                class="flex flex-col items-center p-2 min-w-[64px] rounded-xl transition-all text-mentora-blue-light">
                <div class="p-1 rounded-lg mb-1 bg-mentora-blue-light/10">
                    <i data-lucide="book-open" class="w-6 h-6" stroke-width="2.5"></i>
                </div>
                <span class="text-[10px] font-medium">Fichas</span>
            </a>
            <a href="instructor_subjects.html"
                class="flex flex-col items-center p-2 min-w-[64px] rounded-xl transition-all text-gray-400 hover:text-gray-600">
                <div class="p-1 rounded-lg mb-1">
                    <i data-lucide="users" class="w-6 h-6" stroke-width="2"></i>
                </div>
                <span class="text-[10px] font-medium">Aprendices</span>
            </a>
            <a href="instructor_notifications.html"
                class="flex flex-col items-center p-2 min-w-[64px] rounded-xl transition-all text-gray-400 hover:text-gray-600">
                <div class="p-1 rounded-lg mb-1">
                    <i data-lucide="bell" class="w-6 h-6" stroke-width="2"></i>
                </div>
                <span class="text-[10px] font-medium">Notifs</span>
            </a>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();

            // Extract Ficha ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const fichaId = urlParams.get('id') || '3114544';

            // Set Subtitle
            document.getElementById('ficha-subtitle').textContent = `Ficha ${fichaId}`;

            // Append target ID to the dynamic links
            document.getElementById('btn-dyn-activity').href = `instructor_activity_create.html?ficha=${fichaId}`;
            document.getElementById('btn-dyn-reward').href = `instructor_rewards.html?ficha=${fichaId}`;

            // Generate 20 random students
            const firstNames = ['Carlos', 'Andrés', 'Felipe', 'Santiago', 'Juan', 'Sebastián', 'Mateo', 'Diego', 'Alejandro', 'Daniel', 'María', 'Camila', 'Sofía', 'Valentina', 'Isabella', 'Mariana', 'Daniela', 'Gabriela', 'Laura', 'Natalia'];
            const lastNames = ['Gómez', 'Restrepo', 'Pérez', 'Rodríguez', 'Sánchez', 'Martínez', 'López', 'González', 'Ramírez', 'Hernández', 'Díaz', 'Morales', 'Suárez', 'Castro', 'Ortiz', 'Gutiérrez', 'Rojas', 'Molina', 'Ríos', 'Rendón'];
            const container = document.getElementById('students-list');

            // Pool of avatar photos: default + people + pets + landscapes
            const avatarPool = [
                { src: 'assets/images/img_perfil.svg',       fallback: null },
                { src: 'assets/images/img_perfil.svg',       fallback: null }, // weight x2
                { src: 'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=80&h=80&fit=crop&crop=face', fallback: 'assets/images/img_perfil.svg' },
                { src: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop&crop=face', fallback: 'assets/images/img_perfil.svg' },
                { src: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=80&h=80&fit=crop&crop=face', fallback: 'assets/images/img_perfil.svg' },
                { src: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=80&h=80&fit=crop&crop=face', fallback: 'assets/images/img_perfil.svg' },
                { src: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=80&h=80&fit=crop&crop=face', fallback: 'assets/images/img_perfil.svg' },
                { src: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=80&h=80&fit=crop&crop=face', fallback: 'assets/images/img_perfil.svg' },
                { src: 'https://images.unsplash.com/photo-1548199973-03cce0bbc87b?w=80&h=80&fit=crop',             fallback: 'assets/images/img_perfil.svg' }, // perro
                { src: 'https://images.unsplash.com/photo-1574144611937-0df059b5ef3e?w=80&h=80&fit=crop',             fallback: 'assets/images/img_perfil.svg' }, // gato
                { src: 'https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=80&h=80&fit=crop',             fallback: 'assets/images/img_perfil.svg' }, // perro tierno
                { src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=80&h=80&fit=crop',             fallback: 'assets/images/img_perfil.svg' }, // montaña
                { src: 'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=80&h=80&fit=crop',             fallback: 'assets/images/img_perfil.svg' }, // lago
                { src: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=80&h=80&fit=crop',             fallback: 'assets/images/img_perfil.svg' }, // paisaje
            ];

            // Set container to handle the absolute positioning
            container.classList.add('pb-32');

            for (let i = 0; i < 20; i++) {
                // Randomly select names
                const name = firstNames[Math.floor(Math.random() * firstNames.length)];
                const last = lastNames[Math.floor(Math.random() * lastNames.length)];
                const totalActivities = 5;
                const completedActivities = Math.floor(Math.random() * totalActivities) + 1; // 1 to 5
                const pendingActivities = totalActivities - completedActivities;
                const progress = (completedActivities / totalActivities) * 100;
                const points = Math.floor(Math.random() * 5000) + 100;
                const gradeNum = (Math.random() * 4 + 1);
                const grade = gradeNum.toFixed(1);

                // Pick random avatar from pool
                const avatarData = avatarPool[Math.floor(Math.random() * avatarPool.length)];
                const avatarSrc = avatarData.src;
                const avatarFallback = avatarData.fallback ? `this.onerror=null;this.src='${avatarData.fallback}';` : 'this.onerror=null;';

                // Color formatting based on progress
                let pColor = 'bg-mentora-blue-light';
                if (progress >= 80) pColor = 'bg-mentora-green';
                if (progress <= 30) pColor = 'bg-red-400';

                // Color formatting for grade
                let gradeColor = 'text-mentora-green';
                if (gradeNum < 3.0) {
                    gradeColor = 'text-red-500';
                } else if (gradeNum < 3.5) {
                    gradeColor = 'text-mentora-orange';
                }

                const html = `
                <div class="w-full mb-3 student-wrapper">
                    <!-- Main Card -->
                    <div class="bg-white border border-gray-100 p-4 rounded-xl shadow-sm">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-gray-100 bg-gray-100 shrink-0">
                                    <img src="${avatarSrc}" onerror="${avatarFallback}" alt="Foto de ${name}" class="w-full h-full object-cover">
                                </div>
                                <div>
                                    <p class="font-bold text-gray-800 text-sm leading-tight">${name} ${last}</p>
                                    <p class="text-[11px] text-gray-500 font-medium">${points} pts globales</p>
                                </div>
                            </div>
                            <button class="toggle-btn text-mentora-blue-light p-2 bg-blue-50 rounded-lg hover:bg-blue-100 transition-colors">
                                <i data-lucide="chevron-down" class="w-4 h-4"></i>
                            </button>
                        </div>
                        
                        <div class="flex items-center justify-between text-xs font-bold text-gray-500 mb-1">
                            <span>Progreso de Materia</span>
                            <span class="${pColor.replace('bg-', 'text-')}">${progress}%</span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">
                            <div class="${pColor} h-1.5 rounded-full" style="width: ${progress}%"></div>
                        </div>
                    </div>

                    <!-- Dropdown Details -->
                    <div class="student-details hidden mt-1">
                        <div class="bg-gray-50 border border-gray-100 p-4 rounded-xl shadow-sm">
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div class="bg-white p-2 rounded-lg border border-gray-100 flex flex-col">
                                    <span class="text-[10px] text-gray-400 font-bold uppercase">Puntos Totales</span>
                                    <span class="font-bold text-mentora-blue-dark">${points}</span>
                                </div>
                                <div class="bg-white p-2 rounded-lg border border-gray-100 flex flex-col">
                                    <span class="text-[10px] text-gray-400 font-bold uppercase">Nota Materia</span>
                                    <span class="font-bold ${gradeColor}">${grade}/5.0</span>
                                </div>
                            </div>
                            
                            <div class="bg-white p-3 rounded-lg border border-gray-100 text-sm">
                                <div class="flex justify-between mb-1">
                                    <span class="text-gray-500 font-medium text-xs">Actividades Completadas</span>
                                    <span class="font-bold text-mentora-green">${completedActivities}</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-gray-500 font-medium text-xs">Actividades Faltantes</span>
                                    <span class="font-bold text-red-400">${pendingActivities}</span>
                                </div>
                            </div>
                        </div>
                        
                        <a href="student_profile.html" class="mt-2 block bg-white border border-gray-200 p-3 rounded-xl shadow-sm flex items-center justify-between hover:border-mentora-blue-light transition-colors">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full overflow-hidden border border-gray-100 bg-gray-100">
                                    <img src="${avatarSrc}" onerror="${avatarFallback}" alt="Foto de ${name}" class="w-full h-full object-cover">
                                </div>
                                <span class="font-bold text-sm text-gray-700">Ir a perfil completo</span>
                            </div>
                            <i data-lucide="arrow-up-right" class="w-4 h-4 text-gray-400"></i>
                        </a>
                    </div>
                </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            }
            if (window.lucide) window.lucide.createIcons();

            // Handle toggle
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const wrapper = btn.closest('.student-wrapper');
                    const details = wrapper.querySelector('.student-details');

                    // Close all others first
                    document.querySelectorAll('.student-details').forEach(other => {
                        if (other !== details) other.classList.add('hidden');
                    });

                    // Toggle this one
                    details.classList.toggle('hidden');
                });
            });
        });
    </script>
    <script src="assets/js/app.js"></script>
</body>

</html>
