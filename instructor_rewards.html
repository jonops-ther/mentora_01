<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentora - Asignar Recompensas</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mentora: {
                            blue: { dark: '#143771', light: '#1F6DA9' },
                            green: '#AADD37',
                            orange: '#F9B032',
                            beige: '#ffffab'
                        }
                    },
                    fontFamily: {
                        heading: ['Inter', 'sans-serif'],
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/globals.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 h-[100dvh] overflow-hidden font-sans antialiased text-gray-900 flex justify-center">
    <!-- APP CONTAINER (Mobile Frame) -->
    <div class="w-full max-w-md bg-white h-[100dvh] shadow-2xl relative overflow-hidden flex flex-col">

        <!-- Header -->
        <header class="bg-mentora-blue-dark text-white p-4 flex items-center gap-4 z-10 sticky top-0">
            <button onclick="goBack()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <h1 class="font-heading font-bold text-xl tracking-wide flex-1">Dar Recompensa</h1>
        </header>
        <script>
            function goBack() {
                if (document.referrer && document.referrer.includes('instructor_ficha.html')) {
                    window.location.href = document.referrer;
                } else {
                    window.location.href = 'instructor_home.html';
                }
            }
        </script>

        <!-- Main Content Area -->
        <main id="app-content" class="flex-1 overflow-y-auto pb-6 relative">
            <div class="p-6 space-y-8 animate-in fade-in duration-500 min-h-full flex flex-col">

                <!-- Main Reward Card Form -->
                <form id="reward-form"
                    class="bg-white border-2 border-gray-100 rounded-3xl p-6 shadow-sm flex flex-col gap-5">

                    <div class="flex items-center gap-3 text-mentora-orange mb-2">
                        <div class="p-3 bg-orange-50 rounded-xl">
                            <i data-lucide="award" class="w-8 h-8"></i>
                        </div>
                        <h2 class="font-heading font-bold text-xl text-gray-800">Nueva Recompensa</h2>
                    </div>

                    <!-- Target Ficha -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Seleccionar Ficha *</label>
                        <select id="reward-ficha-select" required
                            class="w-full bg-gray-50 border border-gray-200 px-4 py-3 rounded-xl outline-none focus:border-mentora-blue-light transition-all text-sm appearance-none cursor-pointer">
                            <option value="">Buscar en todas (Global)</option>
                            <option value="3114544">Comunicación - Ficha 3114544</option>
                            <option value="4920192">Comunicación - Ficha 4920192</option>
                            <option value="5928192">Comunicación - Ficha 5928192</option>
                        </select>
                    </div>

                    <!-- Search Student -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Buscar Aprendiz *</label>
                        <div class="relative">
                            <input type="text" required placeholder="Escribe el nombre o documento..."
                                class="w-full bg-gray-50 border border-gray-200 pl-10 pr-4 py-3 rounded-xl outline-none focus:border-mentora-blue-light transition-all text-sm">
                            <i data-lucide="search" class="w-5 h-5 text-gray-400 absolute left-3 top-3"></i>
                        </div>
                    </div>

                    <!-- Activity Selector -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Actividad Vinculada *</label>
                        <div class="relative" id="activity-container">
                            <select id="activity-select" required
                                class="w-full bg-gray-50 border border-gray-200 px-4 py-3 rounded-xl outline-none focus:border-mentora-blue-light transition-all text-sm appearance-none cursor-pointer">
                                <option value="">Selecciona o crea una...</option>
                                <option value="1">Cuestionario Ético Profesional</option>
                                <option value="2">Proyecto de Bilingüismo III</option>
                                <option value="new">+ Crear nueva actividad base...</option>
                            </select>
                            <i data-lucide="chevron-down"
                                class="w-4 h-4 text-gray-400 absolute right-4 top-4 pointer-events-none"></i>
                        </div>
                        <input type="text" id="new-activity-input" placeholder="Nombre de la nueva actividad"
                            class="w-full bg-white border border-mentora-blue-light px-4 py-3 rounded-xl outline-none text-sm mt-2 hidden transition-all">
                    </div>

                    <!-- Points -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Puntos a Otorgar *</label>
                        <div class="relative">
                            <input type="number" required min="1" placeholder="Ej. 100"
                                class="w-full bg-gray-50 border border-gray-200 pl-10 pr-4 py-3 rounded-xl outline-none focus:border-mentora-orange transition-all text-sm">
                            <i data-lucide="star"
                                class="w-5 h-5 text-mentora-orange absolute left-3 top-3 fill-current"></i>
                        </div>
                    </div>

                    <!-- Badge -->
                    <div class="space-y-3">
                        <label class="block text-sm font-bold text-gray-700 mb-1">Insignia Especial (Opcional)</label>
                        <select id="badge-type-select"
                            class="w-full bg-gray-50 border border-gray-200 px-4 py-3 rounded-xl outline-none focus:border-mentora-blue-light transition-all text-sm appearance-none cursor-pointer">
                            <option value="none">Sin insignia</option>
                            <option value="existing_1">Trabajo en Equipo (Existente)</option>
                            <option value="existing_2">Excelente Orador (Existente)</option>
                            <option value="new">Crear Nueva Recompensa...</option>
                        </select>

                        <!-- Menu for new badge -->
                        <div id="new-badge-form"
                            class="hidden bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-3 mt-2">
                            <div>
                                <label class="block text-xs font-bold text-gray-700 mb-1">Nombre de la Insignia</label>
                                <input type="text" placeholder="Ej. Liderazgo Positivo"
                                    class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-mentora-orange transition-all text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-700 mb-1">Diseño de la Insignia</label>
                                <select id="internal-badge-type-select"
                                    class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-mentora-orange transition-all text-sm mb-2 cursor-pointer">
                                    <option value="icon">Ícono de la aplicación</option>
                                    <option value="upload">Subir imagen personalizada</option>
                                </select>

                                <div id="badge-icon-select-container"
                                    class="grid grid-cols-4 gap-2 mb-2 p-2 bg-white rounded-lg border border-gray-200">
                                    <button type="button"
                                        class="p-2 border border-gray-100 rounded-lg hover:bg-orange-50 hover:border-mentora-orange transition-colors flex justify-center"><i
                                            data-lucide="award" class="w-5 h-5 text-gray-600"></i></button>
                                    <button type="button"
                                        class="p-2 border border-gray-100 rounded-lg hover:bg-orange-50 hover:border-mentora-orange transition-colors flex justify-center"><i
                                            data-lucide="star" class="w-5 h-5 text-gray-600"></i></button>
                                    <button type="button"
                                        class="p-2 border border-gray-100 rounded-lg hover:bg-orange-50 hover:border-mentora-orange transition-colors flex justify-center"><i
                                            data-lucide="shield" class="w-5 h-5 text-gray-600"></i></button>
                                    <button type="button"
                                        class="p-2 border border-gray-100 rounded-lg hover:bg-orange-50 hover:border-mentora-orange transition-colors flex justify-center"><i
                                            data-lucide="zap" class="w-5 h-5 text-gray-600"></i></button>
                                </div>

                                <input type="file" id="new-badge-image" accept="image/*"
                                    class="hidden w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-orange-50 file:text-mentora-orange hover:file:bg-orange-100 cursor-pointer">
                            </div>
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" id="submit-reward-btn"
                        class="w-full py-4 mt-2 bg-mentora-orange text-white rounded-xl font-bold text-lg shadow-md hover:bg-orange-500 flex justify-center items-center gap-2 transition-all active:scale-95">
                        <i data-lucide="gift" class="w-5 h-5"></i>
                        Otorgar Recompensa
                    </button>
                </form>

                <!-- Reward History -->
                <div>
                    <h3 class="font-heading font-bold text-lg text-mentora-blue-dark mb-4">Historial de Recompensas</h3>

                    <div class="space-y-4">

                        <!-- History Item 1 -->
                        <div
                            class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div
                                    class="w-10 h-10 bg-mentora-blue-light/10 text-mentora-blue-light rounded-full flex items-center justify-center font-bold">
                                    F
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-800 text-sm">Felipe Restrepo</h4>
                                    <p class="text-xs text-gray-500 truncate max-w-[150px]">Cuestionario Ético
                                        Profesional</p>
                                </div>
                            </div>
                            <div class="flex flex-col items-end">
                                <div class="flex items-center gap-1 font-bold text-mentora-green">
                                    <span>+150</span>
                                    <i data-lucide="star" class="w-3 h-3 fill-current"></i>
                                </div>
                                <span class="text-[10px] text-gray-400">Hace 2 horas</span>
                            </div>
                        </div>

                        <!-- History Item 2 -->
                        <div
                            class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div
                                    class="w-10 h-10 bg-orange-100 text-mentora-orange rounded-full flex items-center justify-center font-bold">
                                    A
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-800 text-sm">Andrés Sánchez</h4>
                                    <p class="text-xs text-gray-500 truncate max-w-[150px]">Participación Voluntaria</p>
                                </div>
                            </div>
                            <div class="flex flex-col items-end">
                                <div class="flex items-center gap-1 font-bold text-mentora-green">
                                    <span>+50</span>
                                    <i data-lucide="star" class="w-3 h-3 fill-current"></i>
                                </div>
                                <span class="text-[10px] text-gray-400">Ayer</span>
                            </div>
                        </div>

                        <!-- History Item 3 -->
                        <div
                            class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between relative overflow-hidden">
                            <div class="absolute right-0 top-0 bottom-0 w-1 bg-mentora-orange"></div>
                            <div class="flex items-center gap-3">
                                <div
                                    class="w-10 h-10 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center font-bold">
                                    M
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-800 text-sm">María Camila</h4>
                                    <p class="text-xs text-gray-500 truncate max-w-[150px]">Proyecto de Bilingüismo III
                                    </p>
                                </div>
                            </div>
                            <div class="flex flex-col items-end space-y-1">
                                <div class="flex items-center gap-1 font-bold text-mentora-green">
                                    <span>+300</span>
                                    <i data-lucide="star" class="w-3 h-3 fill-current"></i>
                                </div>
                                <div
                                    class="bg-purple-100 text-purple-600 text-[9px] px-1.5 py-0.5 rounded font-bold uppercase tracking-wide">
                                    Insignia
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </main>

        <!-- Notification Toast (Hidden by default) -->
        <div id="toast-success"
            class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl font-medium text-sm flex items-center gap-3 transform transition-all duration-300 translate-y-20 opacity-0 z-50">
            <i data-lucide="check-circle" class="w-5 h-5 text-mentora-green"></i>
            Recompensa asignada con éxito
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();

            const actSelect = document.getElementById('activity-select');
            const newActInput = document.getElementById('new-activity-input');
            const form = document.getElementById('reward-form');
            const toast = document.getElementById('toast-success');

            // Context from URL
            const urlParams = new URLSearchParams(window.location.search);
            const contextFicha = urlParams.get('ficha');
            const fichaSelect = document.getElementById('reward-ficha-select');

            if (contextFicha && fichaSelect) {
                if (fichaSelect.querySelector(`option[value="${contextFicha}"]`)) {
                    fichaSelect.value = contextFicha;
                    fichaSelect.style.pointerEvents = 'none';
                    fichaSelect.style.backgroundColor = '#e5e7eb'; // gray-200 to look locked
                }
            }

            // Handle activity toggle
            actSelect.addEventListener('change', (e) => {
                if (e.target.value === 'new') {
                    newActInput.classList.remove('hidden');
                    newActInput.setAttribute('required', 'true');
                } else {
                    newActInput.classList.add('hidden');
                    newActInput.removeAttribute('required');
                }
            });

            // Handle badge type
            const badgeSelect = document.getElementById('badge-type-select');
            const newBadgeForm = document.getElementById('new-badge-form');
            const internalBadgeTypeSelect = document.getElementById('internal-badge-type-select');
            const badgeIconContainer = document.getElementById('badge-icon-select-container');
            const badgeImageInput = document.getElementById('new-badge-image');

            if (badgeSelect && newBadgeForm) {
                badgeSelect.addEventListener('change', (e) => {
                    if (e.target.value === 'new') {
                        newBadgeForm.classList.remove('hidden');
                    } else {
                        newBadgeForm.classList.add('hidden');
                    }
                });
            }

            if (internalBadgeTypeSelect) {
                internalBadgeTypeSelect.addEventListener('change', (e) => {
                    if (e.target.value === 'icon') {
                        badgeIconContainer.classList.remove('hidden');
                        badgeImageInput.classList.add('hidden');
                    } else {
                        badgeIconContainer.classList.add('hidden');
                        badgeImageInput.classList.remove('hidden');
                    }
                });
            }

            // Handle submission Toast
            form.addEventListener('submit', (e) => {
                e.preventDefault();

                // Reset form visually
                form.reset();
                newActInput.classList.add('hidden');

                // Show toast
                toast.classList.remove('translate-y-20', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');

                setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            });
        });
    </script>
</body>

</html>
